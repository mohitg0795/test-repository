template:
  name: Remote-temp-v1
  identifier: Remotetempv1
  versionLabel: v1
  type: MonitoredService
  tags: {}
  spec:
    serviceRef: account.test_service_mohit
    environmentRef: account.EnvRollout
    type: Application
    sources:
      healthSources:
        - type: Prometheus
          identifier: promeremote
          name: prome-remote
          spec:
            connectorRef: account.dfhfdhfd
            feature: apm
            metricDefinitions:
              - metricName: Prometheus Metric
                identifier: prometheus_metric
                serviceFilter: []
                isManualQuery: true
                query: avg(up{job="cv-datagen"})
                envFilter: []
                additionalFilters: []
                groupName: G1
                sli:
                  enabled: false
                analysis:
                  riskProfile:
                    riskCategory: Performance_ResponseTime
                    thresholdTypes:
                      - ACT_WHEN_LOWER
                  liveMonitoring:
                    enabled: false
                  deploymentVerification:
                    enabled: true
                    serviceInstanceFieldName: instance
            metricPacks:
              - identifier: Custom
                metricThresholds: []
